<!DOCTYPE html>
<html>
<head>
    <title>Admin Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-interface">

<div class="admin-header">
    <div class="header-content">
        <h1>👤 Admin Profile</h1>
        <div class="header-actions">
            <a href="/admin-dashboard" class="logout-btn" style="background:#667eea; border-color:#5568d3;">← Back to Dashboard</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>
</div>

<div class="admin-container" style="max-width: 900px; margin: 30px auto; padding: 0 20px; display:block;">
    <div class="admin-main" style="padding:24px;">
        <div class="section-header" style="margin-bottom:16px;">
            <h2>Account Settings</h2>
        </div>

        {% if error %}
            <div style="padding: 12px 16px; margin-bottom: 16px; border-radius: 6px; background:#fdecea; color:#c0392b; border:1px solid #f5c6cb;">
                {{ error }}
            </div>
        {% endif %}

        {% if success %}
            <div style="padding: 12px 16px; margin-bottom: 16px; border-radius: 6px; background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9;">
                {{ success }}
            </div>
        {% endif %}

        <form method="POST" action="/admin-profile">
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ admin_username }}" disabled>
                <small style="color:#999; font-size:12px;">Username is fixed for the main admin account.</small>
            </div>

            <div class="form-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" name="email" value="{{ admin_email }}" required>
            </div>

            <div class="form-group">
                <label for="admin-password">New Password</label>
                <input type="password" id="admin-password" name="password" placeholder="Leave blank to keep current password">
                <small style="color:#999; font-size:12px;">Password is stored securely in-memory only and never shown in plain text.</small>
            </div>

            <button type="submit" class="submit-btn" style="width:100%; margin-top:10px;">Save Changes</button>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
